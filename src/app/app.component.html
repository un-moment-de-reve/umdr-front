<main class="relative flex w-full flex-col bg-[#fbf9f7] text-[#1b1c1b]">
  <app-top-navigation />
  <app-hero />
  <app-about />
  <app-signature-services />
  <app-spa-experience />

  <!-- Pricing & Gallery -->
  <section
    aria-label="Pricing and Gallery"
    class="w-full px-4 py-6 sm:px-6 md:px-8 lg:px-12"
  >
    <div class="mx-auto flex w-full max-w-[1400px] flex-col items-center gap-6">
      <div class="w-full max-w-[980px]">
        <app-pricing />
      </div>

      <div class="w-full max-w-[1400px]">
        <div
          class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-[1.15fr_1fr]"
        >
          <div class="overflow-hidden rounded-xl shadow-[0_12px_35px_rgba(27,28,27,0.10)]">
            <img
              src="massage-therapy.png"
              alt="Massage relaxant avec huiles essentielles"
              class="h-[280px] w-full object-cover sm:h-[360px] lg:h-full lg:min-h-[520px]"
            />
          </div>

          <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <div class="h-full overflow-hidden rounded-xl shadow-[0_12px_35px_rgba(27,28,27,0.10)]">
              <img
                src="beauty-products.png"
                alt="Produits de soin disposés sur un plateau en marbre"
                class="block h-full w-full object-cover"
              />
            </div>

            <div class="overflow-hidden rounded-xl shadow-[0_12px_35px_rgba(27,28,27,0.10)]">
              <img
                src="nails.png"
                alt="Soin du visage avec masque crème"
                class="block h-full w-full object-cover"
              />
            </div>

            <div class="overflow-hidden rounded-xl shadow-[0_12px_35px_rgba(27,28,27,0.10)] sm:col-span-2">
              <img
                src="spa-reception.png"
                alt="Accueil élégant d’un institut de beauté"
                class="block h-full w-full object-cover"
              />
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <app-testimonials />
  <app-booking-cta />
  <app-footer />
</main>
