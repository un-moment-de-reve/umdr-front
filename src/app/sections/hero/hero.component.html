<section
  aria-label="Présentation du spa"
  class="relative flex min-h-[800px] w-full items-center overflow-hidden bg-[#fbf9f7]"
>
  <div
    class="absolute inset-0 bg-cover bg-center bg-no-repeat"
    style="background-image: url('/luxury-spa-environment.png')"
    aria-hidden="true"
  ></div>
  <div
    class="absolute inset-0"
    style="background: linear-gradient(90deg, rgba(251,249,247,0.88) 0%, rgba(251,249,247,0.62) 34%, rgba(251,249,247,0.18) 62%, rgba(251,249,247,0) 100%)"
    aria-hidden="true"
  ></div>
  <div class="relative mx-auto flex w-full max-w-[1200px] px-6 py-20 sm:px-8 md:px-12 lg:px-16">
    <div class="flex w-full max-w-[672px] flex-col items-start gap-6">
      <header class="flex w-full flex-col items-start">
        <h1 class="font-[Playfair_Display,Helvetica] text-4xl font-normal leading-[1.08] tracking-[-0.96px] sm:text-5xl">
          <span class="text-[#1b1c1b] tracking-[-0.46px]">
            Révélez votre beauté<br />
          </span>
          <span class="italic text-[#874c69] tracking-[-0.46px]">
            naturelle
          </span>
        </h1>
      </header>
      <p class="max-w-[512px] font-[Manrope,Helvetica] text-base font-normal leading-7 tracking-[0] text-[#504348] sm:text-lg">
        Soins visage, corps, regard et bien-être dans un cadre raffiné<br />
        conçu pour votre sérénité à Un Moment De R'Eve.
      </p>
      <nav
        aria-label="Actions principales"
        class="flex w-full flex-col items-start gap-4 pt-4 sm:flex-row sm:flex-wrap sm:items-center sm:gap-6"
      >
        <button
          type="button"
          class="h-auto rounded-full bg-[#874c69] px-8 py-4 font-[Manrope,Helvetica] text-xs font-normal tracking-[1.20px] text-white shadow-[0px_4px_6px_-4px_#0000001a,0px_10px_15px_-3px_#0000001a] hover:bg-[#7a445e] transition-colors"
        >
          DÉCOUVRIR NOS SOINS
        </button>
        <button
          type="button"
          class="h-auto rounded-full border border-[#837379] bg-transparent px-8 py-4 font-[Manrope,Helvetica] text-xs font-normal tracking-[1.20px] text-[#837379] hover:bg-[#837379]/5 transition-colors"
        >
          NOTRE PHILOSOPHIE
        </button>
      </nav>
    </div>
  </div>
</section>
