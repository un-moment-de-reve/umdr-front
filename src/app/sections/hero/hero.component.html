<section
  #heroSection
  aria-label="Présentation du spa"
  class="relative isolate w-full bg-[#fbf9f7] lg:h-[350vh]"
>
  <div
    class="relative flex min-h-[800px] w-full items-center overflow-hidden lg:sticky lg:top-0 lg:h-screen"
  >
    @if (isDesktop) {
      <video
        #heroVideo
        src="/beauty-salon.mp4"
        playsinline
        webkit-playsinline
        preload="auto"
        muted
        class="absolute inset-0 z-0 h-full w-full object-cover"
        aria-hidden="true"
      ></video>
    } @else {
      <img
        src="/beauty-salon.jpg"
        alt=""
        class="absolute inset-0 z-0 h-full w-full object-cover"
        aria-hidden="true"
      />
    }

    <div
      class="absolute inset-y-0 left-0 z-30 w-[62%] bg-gradient-to-r from-[#fbf9f7]/75 via-[#fbf9f7]/75 to-transparent"
      aria-hidden="true"
    ></div>

    <div
      class="relative z-40 mx-auto flex w-full max-w-[1200px] px-6 py-20 sm:px-8 md:px-12 lg:px-16"
    >
      <div
        class="relative z-50 flex w-full max-w-[672px] transform-gpu flex-col items-start gap-6 rounded-[2rem] border border-white/60 bg-[#fbf9f7]/64 p-6 shadow-[0_24px_80px_rgba(80,67,72,0.16)] backdrop-blur-md sm:p-8 md:p-10"
      >
        <header class="relative z-50 flex w-full flex-col items-start">
          <h1
            class="relative z-50 font-[Playfair_Display,Helvetica] text-4xl font-medium leading-[1.08] tracking-[-0.96px] text-[#1b1c1b] sm:text-5xl"
          >
            <span class="tracking-[-0.46px]">
              Révélez votre beauté<br />
            </span>
            <span class="italic text-[#874c69] tracking-[-0.46px]">
              naturelle
            </span>
          </h1>
        </header>

        <p
          class="relative z-50 max-w-[512px] font-[Manrope,Helvetica] text-base font-medium leading-7 tracking-[0] text-[#3f3438] sm:text-lg"
        >
          Soins visage, corps, epilation, manucure et pédicure et mise en beauté dans un cadre raffiné
          conçu pour votre sérénité à <br/>Un Moment De R'Eve.
        </p>

        <nav
          aria-label="Actions principales"
          class="relative z-50 flex w-full flex-col items-start gap-4 pt-4 sm:flex-row sm:flex-wrap sm:items-center sm:gap-6"
        >
          <button
            type="button"
            class="relative z-50 h-auto rounded-full bg-[#874c69] px-8 py-4 font-[Manrope,Helvetica] text-xs font-medium tracking-[1.20px] text-white shadow-[0px_4px_6px_-4px_#0000001a,0px_10px_15px_-3px_#0000001a] transition-colors hover:bg-[#7a445e]"
          >
            DÉCOUVRIR NOS SOINS
          </button>

          <button
            type="button"
            class="relative z-50 h-auto rounded-full border border-[#837379] bg-[#fbf9f7]/70 px-8 py-4 font-[Manrope,Helvetica] text-xs font-medium tracking-[1.20px] text-[#6f5f66] transition-colors hover:bg-[#f2ece9]"
          >
            NOTRE PHILOSOPHIE
          </button>
        </nav>
      </div>
    </div>
  </div>
</section>
