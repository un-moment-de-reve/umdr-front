<section
  class="w-full self-stretch bg-[#874c690d] px-4 py-20 sm:px-6 lg:px-16 lg:py-[120px]"
>
  <div class="mx-auto flex w-full max-w-[1200px] flex-col items-start gap-16">
    <header class="flex w-full flex-col items-center gap-2 text-center">
      <p
        class="font-[Manrope,Helvetica] text-xs font-normal tracking-[2.40px] text-[#874c69]"
      >
        PRESTATIONS PREMIUM
      </p>

      <h2
        class="font-[Playfair_Display,Helvetica] text-[32px] font-normal leading-10 text-[#1b1c1b]"
      >
        Nos Services
      </h2>
    </header>

    <div class="grid w-full grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3">
      @for (service of services; track service.title) {
        <div
          class="group flex h-full flex-col gap-5 rounded-2xl border border-solid border-[#874c691a] bg-[#fbf9f7] p-8 shadow-[0px_1px_2px_#0000000d] transition-all duration-300 hover:-translate-y-1 hover:border-[#874c6933] hover:shadow-[0_18px_45px_rgba(80,67,72,0.12)] sm:p-10"
        >
          <div
            class="flex h-16 w-16 items-center justify-center rounded-2xl border border-[#874c691f] bg-[#874c690d] text-[#874c69] transition-all duration-300 group-hover:bg-[#874c69] group-hover:text-white"
          >
            @switch (service.icon) {
              @case ('smile') {
                <svg
                  lucideSmile
                  class="h-8 w-8"
                  stroke-width="1.8"
                  aria-hidden="true"
                ></svg>
              }

              @case ('user-round') {
                <svg
                  lucideUserRound
                  class="h-8 w-8"
                  stroke-width="1.8"
                  aria-hidden="true"
                ></svg>
              }

              @case ('brush') {
                <svg
                  lucideBrush
                  class="h-8 w-8"
                  stroke-width="1.8"
                  aria-hidden="true"
                ></svg>
              }

              @case ('hand') {
                <svg
                  lucideHand
                  class="h-8 w-8"
                  stroke-width="1.8"
                  aria-hidden="true"
                ></svg>
              }

              @case ('sparkles') {
                <svg
                  lucideSparkles
                  class="h-8 w-8"
                  stroke-width="1.8"
                  aria-hidden="true"
                ></svg>
              }
            }
          </div>

          <div class="flex w-full flex-col items-start pt-2">
            <h3
              class="font-[Playfair_Display,Helvetica] text-xl font-normal leading-7 text-[#1b1c1b]"
            >
              {{ service.title }}
            </h3>
          </div>

          <div class="flex w-full flex-1 flex-col items-start">
            <p
              class="font-[Manrope,Helvetica] text-base font-normal leading-6 text-[#504348]"
            >
              {{ service.description }}
            </p>
          </div>

          <button
            type="button"
            class="flex h-auto items-center gap-2 pt-2 text-left"
          >
            <span
              class="font-[Manrope,Helvetica] text-xs font-normal tracking-[1.20px] text-[#874c69]"
            >
              EN SAVOIR PLUS
            </span>

            <svg
              lucideArrowRight
              class="h-4 w-4 text-[#874c69] transition-transform duration-300 group-hover:translate-x-1"
              stroke-width="1.8"
              aria-hidden="true"
            ></svg>
          </button>
        </div>
      }
    </div>
  </div>
</section>
